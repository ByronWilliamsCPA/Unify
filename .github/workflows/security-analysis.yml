---
# Security Analysis Workflow
# Runs security scans including Bandit and dependency checks.
#
# Features:
#   - Bandit static analysis for Python
#   - Weekly scheduled scans
name: Security Analysis

"on":
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run security scans weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write
  actions: read  # required by org python-security-analysis.yml codeql job

# Uses org-level reusable workflow
jobs:
  security:
    name: Security Scan
    uses: ByronWilliamsCPA/.github/.github/workflows/python-security-analysis.yml@01bb5747a7e14b480b26ab94123f25f5e591cde2 # main
    with:
      no-build: false  # hatchling build backend: editable install must build
      source-directory: 'src'
      python-version: '3.12'
      fail-on-high: true
      fail-on-medium: false
      run-codeql: true
      run-dependency-review: true
      run-bandit: true
      run-osv: true

  security-gate-success:
    name: Security Gate Validation
    runs-on: ubuntu-latest
    needs: [security]
    if: always()
    steps:
      - name: Check security scan results
        run: |
          if [ "${{ needs.security.result }}" == "success" ]; then
            echo "Security Gate passed"
          else
            echo "Security Gate failed: ${{ needs.security.result }}"
            exit 1
          fi
