# Documentation Workflow
# Builds and deploys MkDocs documentation to GitHub Pages.
#
# Features:
#   - MkDocs Material theme build
#   - GitHub Pages deployment on push to main
#   - PR preview builds
name: Documentation

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write  # For GitHub Pages deployment
  pages: write
  id-token: write

# Uses org-level reusable workflow
jobs:
  docs:
    name: Build & Deploy Docs
    uses: ByronWilliamsCPA/.github/.github/workflows/python-docs.yml@01bb5747a7e14b480b26ab94123f25f5e591cde2 # main
    with:
      no-build: false  # hatchling build backend: editable install must build
      python-version: '3.12'
      deploy-to-pages: >-
        ${{
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        }}
