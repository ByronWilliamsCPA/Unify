---
# Release Workflow
# Handles automated releases with semantic versioning or
# manual tag-based releases.
#
# Features:
#   - Semantic versioning (if enabled) or manual tag-based releases
#   - GitHub Release creation
#
# Notes:
#   - Tests run in the upstream CI workflow that triggers this one
#     (run-tests: false here)
#   - PyPI publishing is disabled (publish-to-pypi: false); GitHub
#     Releases only
name: Semantic Release

"on":
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release type (leave empty for auto)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
          - prerelease

# Prevent concurrent releases
concurrency:
  group: "release-${{ github.event.workflow_run.head_branch || github.ref_name }}"
  cancel-in-progress: false

permissions:
  contents: read

# Uses org-level reusable workflow
jobs:
  release:
    name: Release Pipeline
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      attestations: write
    # workflow_dispatch is restricted to main so a manual release cannot
    # bypass CI gating from a feature branch
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
      github.event.workflow_run.conclusion == 'success'
    uses: ByronWilliamsCPA/.github/.github/workflows/python-release.yml@7198a499e8ac9a16b65548c312363a81bae4b4b6  # main
    with:
      no-build: false  # hatchling build backend: editable install must build
      python-version: '3.12'
      coverage-threshold: 80
      source-directory: 'src'
      semantic-release: true
      force-release: "${{ github.event.inputs.force_release || '' }}"
      publish-to-pypi: false
      pypi-package-name: 'foundry-unify'
      run-tests: false
      skip-tests-reason: 'Tests run in upstream CI pipeline before this workflow fires'
    # Pass repo/environment secrets through to the reusable workflow
    # (required for release credentials beyond the default GITHUB_TOKEN)
    secrets: inherit
